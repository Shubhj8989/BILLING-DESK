<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" /> <!-- Slate Blue -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Royal Blue -->
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" /> <!-- Amber -->
      <stop offset="100%" stop-color="#f59e0b" /> <!-- Yellow Gold -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle (Soft Accent) -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="url(#primaryGrad)" stroke-width="6" stroke-dasharray="10 5" opacity="0.15"/>
  <circle cx="250" cy="250" r="215" fill="#f8fafc" opacity="0.95"/>

  <!-- Furniture/Chair Graphic -->
  <g filter="url(#shadow)">
    <!-- Backrest of Chair / Geometric Pillar -->
    <path d="M 200 130 Q 250 110 300 130 L 300 230 L 200 230 Z" fill="url(#primaryGrad)" />
    
    <!-- Gold Seat / Premium Accent -->
    <path d="M 180 230 L 320 230 L 330 255 L 170 255 Z" fill="url(#goldGrad)" />
    
    <!-- Chair Legs -->
    <line x1="200" y1="255" x2="190" y2="330" stroke="url(#primaryGrad)" stroke-width="12" stroke-linecap="round" />
    <line x1="300" y1="255" x2="310" y2="330" stroke="url(#primaryGrad)" stroke-width="12" stroke-linecap="round" />
    <line x1="220" y1="255" x2="215" y2="300" stroke="url(#primaryGrad)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="280" y1="255" x2="285" y2="300" stroke="url(#primaryGrad)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Inner design of Backrest (Minimal lines) -->
    <line x1="250" y1="140" x2="250" y2="210" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5" />
    <line x1="225" y1="150" x2="225" y2="210" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <line x1="275" y1="150" x2="275" y2="210" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  </g>

  <!-- Typography -->
  <text x="250" y="380" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" text-anchor="middle" fill="#1e3a8a" letter-spacing="1">
    VARDHMAN
  </text>
  <text x="250" y="415" font-family="'Outfit', 'Inter', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#d97706" letter-spacing="4">
    FURNITURE HOUSE
  </text>
  <text x="250" y="440" font-family="'Inter', sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#64748b" letter-spacing="1">
    ESTD. 1995
  </text>
</svg>
